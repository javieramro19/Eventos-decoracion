<div class="app-shell">
  <header class="app-header">
    <div class="header-inner container">
      <a class="brand" routerLink="/">
        Evento<span>Sonic</span>
      </a>

      <nav class="nav-links">
        <a routerLink="/" fragment="inicio">Inicio</a>
        <a routerLink="/" fragment="planes">Planes</a>
        <a routerLink="/eventos" routerLinkActive="active">Eventos</a>
        <a *ngIf="authService.isClient()" routerLink="/dashboard" routerLinkActive="active">Mi panel</a>
        <a *ngIf="authService.isAdmin()" routerLink="/admin/requests" routerLinkActive="active">Solicitudes</a>
        <a *ngIf="authService.isAdmin()" routerLink="/admin/events" routerLinkActive="active">Agenda</a>
      </nav>

      <div class="user-block">
        <a *ngIf="!authService.isAuthenticated()" class="cta-link" routerLink="/auth/login">Iniciar sesion / Crear cuenta</a>
        <a *ngIf="authService.isAdmin()" class="cta-link" routerLink="/admin/events/new">Nueva entrada</a>
        <a *ngIf="authService.isClient()" class="cta-link" routerLink="/dashboard">Mi espacio</a>
        <button *ngIf="authService.isAuthenticated()" class="logout" type="button" (click)="authService.logout()">Cerrar sesion</button>
      </div>
    </div>
  </header>

  <main class="router-shell">
    <router-outlet></router-outlet>
  </main>
</div>
